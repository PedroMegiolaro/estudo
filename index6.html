<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exercício Canvas</title>
</head>
<body>

<canvas id="campo" width="500" height="500"></canvas>

<script>
    const canvas = document.getElementById("campo");
    const ctx = canvas.getContext("2d");

    // Fundo
    ctx.fillStyle = "#e8e8e8";
    ctx.fillRect(50, 50, 400, 400);

    // Texto
    ctx.fillStyle = "black";
    ctx.font = "24px Arial";
    ctx.fillText("Desenvolvimento Web", 120, 90);

    // Quadrado vermelho (superior esquerdo)
    ctx.fillStyle = "red";
    ctx.fillRect(50, 50, 40, 40);

    // Quadrado azul (superior direito)
    ctx.fillStyle = "blue";
    ctx.fillRect(410, 50, 40, 40);

    // Quadrado amarelo (inferior esquerdo)
    ctx.fillStyle = "yellow";
    ctx.fillRect(50, 410, 40, 40);

    // Quadrado verde (inferior direito)
    ctx.fillStyle = "green";
    ctx.fillRect(410, 410, 40, 40);

    // Linha vermelha diagonal
    ctx.beginPath();
    ctx.strokeStyle = "red";
    ctx.moveTo(90, 90);
    ctx.lineTo(450, 450);
    ctx.stroke();

    // Linha azul diagonal
    ctx.beginPath();
    ctx.strokeStyle = "blue";
    ctx.moveTo(410, 90);
    ctx.lineTo(50, 450);
    ctx.stroke();

    // Linha central verde
    ctx.beginPath();
    ctx.strokeStyle = "green";
    ctx.moveTo(50, 250);
    ctx.lineTo(450, 250);
    ctx.stroke();

    // Semicírculo verde
    ctx.beginPath();
    ctx.strokeStyle = "green";
    ctx.arc(250, 250, 70, 0, Math.PI, false);
    ctx.stroke();

    // Círculo amarelo esquerdo
    ctx.beginPath();
    ctx.fillStyle = "yellow";
    ctx.arc(120, 170, 20, 0, 2 * Math.PI);
    ctx.fill();
    ctx.strokeStyle = "green";
    ctx.stroke();

    // Círculo amarelo direito
    ctx.beginPath();
    ctx.fillStyle = "yellow";
    ctx.arc(380, 170, 20, 0, 2 * Math.PI);
    ctx.fill();
    ctx.strokeStyle = "green";
    ctx.stroke();

    // Borda externa
    ctx.strokeStyle = "gray";
    ctx.strokeRect(50, 50, 400, 400);
</script>

</body>
</html>
